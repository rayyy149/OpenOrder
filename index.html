<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAFEIN8</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --surface: #131310;
      --card: #1a1a16;
      --accent: #e8c84a;
      --accent2: #e05c2a;
      --text: #f0ede4;
      --muted: #6b6b5e;
      --border: #2a2a22;
      --queue-bg: #0f0f0c;
    }

    .reset-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      color: var(--accent2);
      border-color: var(--accent2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 8, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      line-height: 1;
    }

    .logo span {
      color: var(--accent2);
    }

    .header-sub {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* LAYOUT */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      min-height: calc(100vh - 81px);
    }

    /* MENU SIDE */
    .menu-side {
      padding: 48px;
      border-right: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .category-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tab.active {
      background: var(--accent);
      color: #0a0a08;
      border-color: var(--accent);
      font-weight: 500;
    }

    .drinks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .drink-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .drink-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .drink-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .drink-card:hover::before {
      transform: scaleX(1);
    }

    .drink-icon {
      font-size: 2.4rem;
      margin-bottom: 16px;
      display: block;
    }

    .drink-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .drink-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
      font-style: italic;
    }

    /* CONFIRM MODAL */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .confirm-overlay.open {
      display: flex;
    }

    .confirm-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 32px;
      width: 380px;
      text-align: center;
      animation: panelIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .confirm-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
    }

    .confirm-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .confirm-desc {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 24px;
    }

    .confirm-modal .name-input-row {
      text-align: left;
      margin-bottom: 20px;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
    }

    .confirm-btn {
      flex: 1;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .confirm-no {
      background: var(--border);
      color: var(--text);
    }

    .confirm-no:hover {
      background: #3a3a2e;
    }

    .confirm-yes {
      background: var(--accent);
      color: #0a0a08;
    }

    .confirm-yes:hover {
      background: #f0d66a;
      transform: translateY(-1px);
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .name-input-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .name-input-row label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .name-input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .name-input:focus {
      border-color: var(--accent);
    }

    .name-input::placeholder {
      color: var(--muted);
    }

    /* QUEUE SIDE */
    .queue-side {
      background: var(--queue-bg);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 81px;
      height: calc(100vh - 81px);
      overflow: hidden;
    }

    .queue-header {
      padding: 32px 28px 20px;
      border-bottom: 1px solid var(--border);
    }

    .queue-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4);
      }

      50% {
        opacity: 0.8;
        box-shadow: 0 0 0 6px rgba(74, 222, 128, 0);
      }
    }

    .queue-stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }

    .stat {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat strong {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* Order entries */
    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 28px;
    }

    .queue-list::-webkit-scrollbar {
      width: 4px;
    }

    .queue-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .queue-list::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .queue-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .queue-empty-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .queue-empty p {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .order-entry {
      border: 1px solid var(--border);
      margin-bottom: 10px;
      padding: 16px;
      position: relative;
      animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .order-entry.status-preparing {
      border-left: 3px solid var(--accent2);
    }

    .order-entry.status-ready {
      border-left: 3px solid #4ade80;
    }

    .order-entry.status-pending {
      border-left: 3px solid var(--muted);
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .order-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .order-status {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .status-pending .order-status {
      background: rgba(107, 107, 94, 0.2);
      color: var(--muted);
    }

    .status-preparing .order-status {
      background: rgba(224, 92, 42, 0.15);
      color: var(--accent2);
    }

    .status-ready .order-status {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }

    .order-items-list {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .order-items-list .item-line {
      display: flex;
      justify-content: space-between;
    }

    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .order-time {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .order-total {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--text);
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--accent2);
    }

    .status-preparing .progress-bar {
      animation: autoProgress 8s ease-out forwards;
    }

    @keyframes autoProgress {
      from {
        width: 0%;
      }

      to {
        width: 95%;
      }
    }

    .status-ready .progress-bar {
      background: #4ade80;
      width: 100% !important;
      animation: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #0a0a08;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      z-index: 500;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .queue-side {
        position: relative;
        top: 0;
        height: auto;
        min-height: 400px;
      }

      header {
        padding: 16px 20px;
      }

      .menu-side {
        padding: 24px 20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div>
      <div class="logo">KAFEIN8</div>
      <div class="header-sub">Craft Bar & Beverages</div>
    </div>
    <div></div>
  </header>

  <div class="main-layout">
    <!-- MENU -->
    <div class="menu-side">
      <div class="section-label">Select Your Drink</div>

      <div class="category-tabs">
        <button class="tab active" onclick="filterCat('all', this)">Available Drinks</button>
      </div>

      <div class="drinks-grid" id="drinksGrid"></div>
    </div>

    <!-- QUEUE -->
    <div class="queue-side">
      <div class="queue-header">
        <div class="queue-title" style="justify-content: space-between;">
          <div style="display:flex; align-items:center; gap:12px;">
            <span class="live-dot"></span>
            Order Queue
          </div>
        </div>
        <div class="queue-stats">
          <div class="stat">
            <strong id="statTotal">0</strong>
            Orders Today
          </div>
          <div class="stat">
            <strong id="statPending">0</strong>
            In Progress
          </div>
          <div class="stat">
            <strong id="statReady">0</strong>
            Ready
          </div>
        </div>
      </div>
      <div class="queue-list" id="queueList">
        <div class="queue-empty">
          <div class="queue-empty-icon">🥤</div>
          <p>No orders yet</p>
          <p style="margin-top:6px;font-size:0.7rem;opacity:0.5">Orders will appear here live</p>
        </div>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <span class="confirm-icon" id="confirmIcon"></span>
      <div class="confirm-title" id="confirmTitle"></div>
      <div class="confirm-desc" id="confirmDesc"></div>
      <div id="tempOptions" style="margin:16px 0; display:none;">
        <div
          style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">
        </div>
        <button id="tempHot"
          style="margin-right:8px;padding:8px 12px;border:1px solid var(--border);background:var(--accent);color:#0a0a08;cursor:pointer;">Hot</button>
        <button id="tempCold"
          style="padding:8px 12px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;">Cold</button>
      </div>
      <div class="name-input-row">
        <label>Your WhatsApp Number</label>
        <input class="name-input" type="tel" id="customerName" placeholder="e.g. 673xxxxxxx">
      </div>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-no" onclick="closeConfirm()">No</button>
        <button class="confirm-btn confirm-yes" onclick="confirmOrder()">Yes, Order</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhjg4rGeaSg7byAwbJOnA8_5nAEPAd39U",
      authDomain: "openorder-a1eac.firebaseapp.com",
      projectId: "openorder-a1eac",
      storageBucket: "openorder-a1eac.firebasestorage.app",
      messagingSenderId: "881392262545",
      appId: "1:881392262545:web:9f9700291f454d4d7f8e30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const DRINKS = [
      { id: 1, name: 'Spanish Latte', icon: '☕', desc: 'Espresso, condensed milk, milk', cat: 'coffee' },
      { id: 2, name: 'Mocha Latte', icon: '☕', desc: 'Espresso, chocolate, milk', cat: 'coffee' },
      { id: 3, name: 'Latte', icon: '☕', desc: 'Espresso and milk', cat: 'coffee' },
      { id: 4, name: 'Iced Matcha Latte', icon: '🥤', desc: 'Matcha, milk, served over ice', cat: 'matcha' },
      { id: 6, name: 'Iced Strawberry Matcha Latte', icon: '🍓', desc: 'Matcha, strawberry jam, milk, served over ice', cat: 'matcha' },
    ];

    let orders = [];
    let orderCounter = 0;
    let totalOrdersToday = 0;
    let selectedDrink = null;
    let selectedTemp = 'hot';

    // Render menu
    function renderDrinks(cat = 'all') {
      const grid = document.getElementById('drinksGrid');
      const filtered = cat === 'all' ? DRINKS : DRINKS.filter(d => d.cat === cat);
      grid.innerHTML = filtered.map(d => `
    <div class="drink-card" onclick="promptOrder(${d.id})">
      <span class="drink-icon">${d.icon}</span>
      <div class="drink-name">${d.name}</div>
      <div class="drink-desc">${d.desc}</div>
    </div>
  `).join('');
    }

    function filterCat(cat, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderDrinks(cat);
    }

    function promptOrder(id) {
      selectedDrink = DRINKS.find(d => d.id === id);
      if (!selectedDrink) return;
      document.getElementById('confirmIcon').textContent = selectedDrink.icon;
      document.getElementById('confirmTitle').textContent = `Order ${selectedDrink.name}?`;
      document.getElementById('confirmDesc').textContent = selectedDrink.desc;

      const tempOptions = document.getElementById('tempOptions');
      if (id >= 1 && id <= 3) {
        selectedTemp = 'hot';
        tempOptions.style.display = 'block';
        document.getElementById('tempHot').style.background = 'var(--accent)';
        document.getElementById('tempHot').style.color = '#0a0a08';
        document.getElementById('tempCold').style.background = 'var(--card)';
        document.getElementById('tempCold').style.color = 'var(--text)';
      } else {
        tempOptions.style.display = 'none';
        selectedTemp = 'hot';
      }

      document.getElementById('confirmOverlay').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('open');
      selectedDrink = null;
      selectedTemp = 'hot';
      document.getElementById('tempOptions').style.display = 'none';
    }

    async function confirmOrder() {
      if (!selectedDrink) return;
      const name = document.getElementById('customerName').value.trim();
      if (!name) {
        showToast('Please enter your WhatsApp number.');
        document.getElementById('customerName').focus();
        return;
      }
      const drink = selectedDrink;
      const tempLabel = (drink.id >= 1 && drink.id <= 3) ? (selectedTemp === 'hot' ? 'Hot' : 'Cold') : '';
      const itemName = tempLabel ? `${tempLabel} ${drink.name}` : drink.name;

      const newId = orderCounter + 1;

      closeConfirm();
      document.getElementById('customerName').value = '';
      showToast(`Order #${newId} placed!`);

      try {
        await addDoc(collection(db, 'orders'), {
          id: newId,
          name,
          phone: name,
          items: [{ name: itemName, icon: drink.icon, qty: 1 }],
          status: 'pending',
          createdAt: serverTimestamp()
        });
      } catch (e) {
        console.error(e);
        showToast('Failed to place order');
      }
    }

    // Close confirm modal when clicking outside
    document.addEventListener('click', function (e) {
      const overlay = document.getElementById('confirmOverlay');
      if (e.target === overlay) closeConfirm();
    });

    function renderQueue() {
      const list = document.getElementById('queueList');
      if (!orders.length) {
        list.innerHTML = `<div class="queue-empty"><div class="queue-empty-icon">🥤</div><p>No orders yet</p><p style="margin-top:6px;font-size:0.7rem;opacity:0.5">Orders will appear here live</p></div>`;
        updateStats();
        return;
      }

      list.innerHTML = orders.map(o => {
        const timeStr = o.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const itemLines = o.items.map(i =>
          `<div class="item-line"><span>${i.icon} ${i.name}${i.qty > 1 ? ` ×${i.qty}` : ''}</span></div>`
        ).join('');
        const statusLabel = o.status === 'pending' ? 'Queued' : o.status === 'preparing' ? 'Preparing...' : 'Ready ✓';
        const progressStyle = o.status === 'ready' ? 'style="width: 100%;"' : '';

        return `
      <div class="order-entry status-${o.status}" data-id="${o.id}">
        <div class="order-top">
          <span class="order-num">#${o.id} · ${o.name}</span>
          <span class="order-status">${statusLabel}</span>
        </div>
        <div class="order-items-list">${itemLines}</div>
        <div class="order-footer">
          <span class="order-time">${timeStr}</span>
        </div>
        <div class="progress-bar" ${progressStyle}></div>
      </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      const pending = orders.filter(o => o.status !== 'ready').length;
      const ready = orders.filter(o => o.status === 'ready').length;
      document.getElementById('statTotal').textContent = totalOrdersToday;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statReady').textContent = ready;
    }

    // Temperature selection handlers
    function setupTempButtons() {
      const tempHot = document.getElementById('tempHot');
      const tempCold = document.getElementById('tempCold');

      tempHot.addEventListener('click', () => {
        selectedTemp = 'hot';
        tempHot.style.background = 'var(--accent)';
        tempHot.style.color = '#0a0a08';
        tempCold.style.background = 'var(--card)';
        tempCold.style.color = 'var(--text)';
      });

      tempCold.addEventListener('click', () => {
        selectedTemp = 'cold';
        tempCold.style.background = 'var(--accent)';
        tempCold.style.color = '#0a0a08';
        tempHot.style.background = 'var(--card)';
        tempHot.style.color = 'var(--text)';
      });
    }

    setupTempButtons();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    window.filterCat = filterCat;
    window.promptOrder = promptOrder;
    window.closeConfirm = closeConfirm;
    window.confirmOrder = confirmOrder;
    window.setupTempButtons = setupTempButtons;

    // Init Firebase listener
    const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
      orders = snapshot.docs.map(docSnap => {
        const data = docSnap.data();
        return {
          _docId: docSnap.id,
          id: data.id || 0,
          name: data.name,
          items: data.items || [],
          status: data.status,
          time: data.createdAt ? data.createdAt.toDate() : new Date()
        };
      });
      totalOrdersToday = orders.length;
      if (orders.length > 0) {
        orderCounter = Math.max(...orders.map(o => o.id));
      }
      renderQueue();
    });

    // Init
    renderDrinks();
    renderQueue();
  </script>
</body>

</html>
