<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAFEIN8 — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08;
      --surface: #131310;
      --card: #1a1a16;
      --accent: #e8c84a;
      --accent2: #e05c2a;
      --green: #4ade80;
      --text: #f0ede4;
      --muted: #6b6b5e;
      --border: #2a2a22;
      --danger: #e05c2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 8, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      line-height: 1;
    }

    .admin-badge {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-top: 3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

    .live-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1;
    }

    .stat-val.accent { color: var(--accent); }
    .stat-val.orange { color: var(--accent2); }
    .stat-val.green { color: var(--green); }

    .stat-lbl {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }

    .reset-all-btn {
      margin-left: auto;
      padding: 12px 28px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reset-all-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* MAIN CONTENT */
    .main {
      padding: 40px 48px;
      max-width: 1400px;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
    }

    .ftab {
      padding: 7px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ftab:hover { border-color: var(--accent); color: var(--accent); }
    .ftab.active { background: var(--accent); color: #0a0a08; border-color: var(--accent); font-weight: 500; }

    /* ORDER CARDS GRID */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .order-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }

    /* Status colour strips */
    .order-card.s-pending   { border-left: 3px solid var(--muted); }
    .order-card.s-preparing { border-left: 3px solid var(--accent2); }
    .order-card.s-ready     { border-left: 3px solid var(--green); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .card-name {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-pill {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 2px;
      font-weight: 500;
    }

    .s-pending   .status-pill { background: rgba(107,107,94,0.2);  color: var(--muted); }
    .s-preparing .status-pill { background: rgba(224,92,42,0.15);  color: var(--accent2); }
    .s-ready     .status-pill { background: rgba(74,222,128,0.15); color: var(--green); }

    .card-items {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      margin-bottom: 14px;
    }

    .card-item-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-time {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    /* ACTION BUTTONS */
    .card-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 9px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    .action-btn.btn-next {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a08;
      font-weight: 500;
    }

    .action-btn.btn-next:hover { background: #f0d66a; border-color: #f0d66a; }

    .action-btn.btn-done {
      background: var(--green);
      border-color: var(--green);
      color: #0a0a08;
      font-weight: 500;
    }

    .action-btn.btn-done:hover { background: #6ef5a0; border-color: #6ef5a0; }

    .action-btn.btn-delete {
      flex: none;
      width: 36px;
      padding: 9px;
      color: var(--muted);
      font-size: 1rem;
    }

    .action-btn.btn-delete:hover { border-color: var(--danger); color: var(--danger); }

    /* Progress bar at bottom */
    .card-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--accent2);
      transition: width 0.3s;
    }

    .s-pending   .card-progress { width: 0%; background: var(--muted); }
    .s-preparing .card-progress { animation: autoProgress 8s ease-out forwards; }
    .s-ready     .card-progress { width: 100%; background: var(--green); }

    @keyframes autoProgress {
      from { width: 0%; }
      to   { width: 95%; }
    }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; margin-bottom: 6px; }
    .empty-sub { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }

    /* CONFIRM RESET MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px 36px;
      width: 420px;
      text-align: center;
      animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon { font-size: 3.5rem; display: block; margin-bottom: 16px; }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .modal-desc { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-bottom: 28px; }

    .modal-actions { display: flex; gap: 12px; }

    .modal-btn {
      flex: 1;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel { background: var(--border); color: var(--text); }
    .btn-cancel:hover { background: #3a3a2e; }
    .btn-confirm-reset { background: var(--danger); color: #fff; }
    .btn-confirm-reset:hover { background: #f07050; transform: translateY(-1px); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #0a0a08;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      z-index: 500;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.green-toast { background: var(--green); }
    .toast.red-toast { background: var(--danger); color: #fff; }

    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      .stats-bar { padding: 16px 20px; gap: 20px; flex-wrap: wrap; }
      .reset-all-btn { margin-left: 0; width: 100%; justify-content: center; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>

<body>

  <header>
    <div>
      <div class="logo">KAFEIN8</div>
      <div class="admin-badge">⚙ Admin Control Panel</div>
    </div>
    <div class="header-right">
      <span class="live-dot"></span>
      <span class="live-label">Live</span>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-val accent" id="sTotal">0</span>
      <span class="stat-lbl">Total Orders</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val" id="sPending">0</span>
      <span class="stat-lbl">Queued</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val orange" id="sPreparing">0</span>
      <span class="stat-lbl">Preparing</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-val green" id="sReady">0</span>
      <span class="stat-lbl">Ready</span>
    </div>

    <button class="reset-all-btn" onclick="openResetModal()">
      🗑 Reset All Orders
    </button>
  </div>

  <!-- FILTER TABS -->
  <div class="main">
    <div class="section-label">Manage Orders</div>

    <div class="filter-tabs">
      <button class="ftab active" id="tab-all"       onclick="setFilter('all',   this)">All</button>
      <button class="ftab"        id="tab-pending"   onclick="setFilter('pending',    this)">Queued</button>
      <button class="ftab"        id="tab-preparing" onclick="setFilter('preparing',  this)">Preparing</button>
      <button class="ftab"        id="tab-ready"     onclick="setFilter('ready',      this)">Ready</button>
    </div>

    <div class="orders-grid" id="ordersGrid">
      <div class="empty-state">
        <div class="empty-icon">🥤</div>
        <div class="empty-title">No Orders Yet</div>
        <div class="empty-sub">Orders will appear here in real time</div>
      </div>
    </div>
  </div>

  <!-- RESET CONFIRM MODAL -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal-box">
      <span class="modal-icon">⚠️</span>
      <div class="modal-title">Reset All Orders?</div>
      <div class="modal-desc">This will permanently delete every order from today. This action cannot be undone.</div>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="closeResetModal()">Cancel</button>
        <button class="modal-btn btn-confirm-reset" onclick="resetAllOrders()">Yes, Reset</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import {
      getFirestore, collection, onSnapshot, query, orderBy,
      updateDoc, deleteDoc, doc, getDocs
    } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAhjg4rGeaSg7byAwbJOnA8_5nAEPAd39U",
      authDomain: "openorder-a1eac.firebaseapp.com",
      projectId: "openorder-a1eac",
      storageBucket: "openorder-a1eac.firebasestorage.app",
      messagingSenderId: "881392262545",
      appId: "1:881392262545:web:9f9700291f454d4d7f8e30"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let orders = [];
    let currentFilter = 'all';

    const STATUS_CYCLE = { pending: 'preparing', preparing: 'ready' };
    const STATUS_LABELS = { pending: 'Queued', preparing: 'Preparing...', ready: 'Ready ✓' };

    // Normalise phone for wa.me (strip spaces, dashes, parentheses; keep leading +)
    function normalisePhone(raw) {
      return (raw || '').replace(/[\s\-().]/g, '');
    }

    // Advance order to next status
    async function advanceStatus(docId, currentStatus, phone) {
      const next = STATUS_CYCLE[currentStatus];
      if (!next) return;
      try {
        await updateDoc(doc(db, 'orders', docId), { status: next });
        if (next === 'ready' && phone) {
          const p = normalisePhone(phone);
          const msg = encodeURIComponent('Hi! 👋 Your drink at KAFEIN8 is ready for pickup. Come grab it while it\'s fresh! ☕');
          window.open(`https://wa.me/${p}?text=${msg}`, '_blank');
          showToast('✅ Ready! WhatsApp opened to notify customer.', 'green-toast');
        } else {
          showToast(next === 'preparing' ? '🔥 Now Preparing!' : '✅ Order Ready!', next === 'ready' ? 'green-toast' : '');
        }
      } catch (e) {
        showToast('Failed to update status', 'red-toast');
      }
    }

    // Delete single order
    async function deleteOrder(docId) {
      try {
        await deleteDoc(doc(db, 'orders', docId));
        showToast('Order removed');
      } catch (e) {
        showToast('Failed to remove order', 'red-toast');
      }
    }

    // Reset ALL orders
    async function resetAllOrders() {
      closeResetModal();
      try {
        const snap = await getDocs(collection(db, 'orders'));
        const deletes = snap.docs.map(d => deleteDoc(doc(db, 'orders', d.id)));
        await Promise.all(deletes);
        showToast('🗑 All orders cleared!', 'red-toast');
      } catch (e) {
        showToast('Failed to reset orders', 'red-toast');
      }
    }

    function renderOrders() {
      const grid = document.getElementById('ordersGrid');
      const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);

      if (!filtered.length) {
        const msg = currentFilter === 'all' ? 'No orders yet' : `No ${currentFilter} orders`;
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🥤</div>
            <div class="empty-title">${msg}</div>
            <div class="empty-sub">Orders will appear here in real time</div>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(o => {
        const timeStr = o.time ? o.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--';
        const items = (o.items || []).map(i =>
          `<div class="card-item-row"><span>${i.icon || '☕'}</span><span>${i.name}${i.qty > 1 ? ' ×' + i.qty : ''}</span></div>`
        ).join('');

        // WhatsApp quick-ping link for already-ready orders
        const waPhone = normalisePhone(o.phone || o.name || '');
        const waMsg = encodeURIComponent('Hi! 👋 Your drink at KAFEIN8 is ready for pickup. Come grab it while it\'s fresh! ☕');
        const waLink = waPhone ? `<a href="https://wa.me/${waPhone}?text=${waMsg}" target="_blank" style="font-size:0.7rem;color:#25D366;text-decoration:none;letter-spacing:0.05em;">📲 WhatsApp</a>` : '';
        const phoneDisplay = o.phone || o.name || '—';

        let primaryBtn = '';
        if (o.status === 'pending') {
          primaryBtn = `<button class="action-btn btn-next" onclick="advanceStatus('${o._docId}', '${o.status}', '${(o.phone || o.name || '').replace(/'/g, '')}')" >▶ Prepare</button>`;
        } else if (o.status === 'preparing') {
          primaryBtn = `<button class="action-btn btn-done" onclick="advanceStatus('${o._docId}', '${o.status}', '${(o.phone || o.name || '').replace(/'/g, '')}')" >✓ Mark Ready</button>`;
        } else {
          primaryBtn = `<button class="action-btn" style="opacity:0.4;cursor:default">✓ Completed</button>`;
        }

        return `
          <div class="order-card s-${o.status}">
            <div class="card-top">
              <div>
                <div class="card-num">#${o.id}</div>
                <div class="card-name">📱 ${phoneDisplay} &nbsp;${waLink}</div>
                <div class="card-name" style="margin-top:2px;opacity:0.6;font-size:0.68rem;">${timeStr}</div>
              </div>
              <span class="status-pill">${STATUS_LABELS[o.status] || o.status}</span>
            </div>
            <div class="card-items">${items}</div>
            <div class="card-actions">
              ${primaryBtn}
              <button class="action-btn btn-delete" title="Delete order" onclick="deleteOrder('${o._docId}')">🗑</button>
            </div>
            <div class="card-progress"></div>
          </div>`;
      }).join('');

      updateStats();
    }

    function updateStats() {
      document.getElementById('sTotal').textContent = orders.length;
      document.getElementById('sPending').textContent = orders.filter(o => o.status === 'pending').length;
      document.getElementById('sPreparing').textContent = orders.filter(o => o.status === 'preparing').length;
      document.getElementById('sReady').textContent = orders.filter(o => o.status === 'ready').length;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderOrders();
    }

    function openResetModal() {
      document.getElementById('resetModal').classList.add('open');
    }

    function closeResetModal() {
      document.getElementById('resetModal').classList.remove('open');
    }

    function showToast(msg, cls = '') {
      const t = document.getElementById('toast');
      t.className = 'toast' + (cls ? ' ' + cls : '');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // Close modal on backdrop click
    document.getElementById('resetModal').addEventListener('click', function(e) {
      if (e.target === this) closeResetModal();
    });

    // Expose to global for inline handlers
    window.advanceStatus = advanceStatus;
    window.deleteOrder = deleteOrder;
    window.resetAllOrders = resetAllOrders;
    window.setFilter = setFilter;
    window.openResetModal = openResetModal;
    window.closeResetModal = closeResetModal;

    // Firebase listener
    const q = query(collection(db, 'orders'), orderBy('createdAt', 'asc'));
    onSnapshot(q, (snapshot) => {
      orders = snapshot.docs.map(docSnap => {
        const data = docSnap.data();
        return {
          _docId: docSnap.id,
          id: data.id || 0,
          name: data.name,
          phone: data.phone || data.name || '',
          items: data.items || [],
          status: data.status || 'pending',
          time: data.createdAt ? data.createdAt.toDate() : new Date()
        };
      });
      renderOrders();
    });
  </script>

</body>
</html>
